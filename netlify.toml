# Netlify deploy configuration — build settings are read from here,
# so the UI only needs the repo connection and the env variables.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback: let React Router handle every path
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
